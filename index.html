<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Divine Showdown: Omega Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #title-screen { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://wallpaperaccess.com/full/51441.jpg'); background-size: cover; z-index: 200; }
        .omega-text { font-size: 70px; margin: 0; background: linear-gradient(to right, #ff0055, #00ffcc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .btn { font-size: 18px; padding: 12px 35px; cursor: pointer; margin: 8px; background: rgba(0,0,0,0.9); border: 2px solid #00ffcc; color: #00ffcc; z-index: 500; position: relative; transition: 0.1s; }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; }
        #game-ui { display: none; width: 1000px; justify-content: space-between; padding: 10px; z-index: 50; position: absolute; top: 0; }
        .pct-text { font-size: 50px; font-style: italic; margin: 0; color: #ff0055; text-shadow: 3px 3px #000; }
        canvas { border: 4px solid #00ffcc; background-color: #111; background-size: cover; display: none; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { padding: 15px; border: 2px solid #444; cursor: pointer; background: #111; }
        .card.selected { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; }
    </style>
</head>
<body>

<div id="title-screen" class="screen">
    <h1 class="omega-text">OMEGA</h1>
    <div class="btn" onclick="setMode('npc')">SOLO BATTLE</div>
    <div class="btn" onclick="show('multi-menu')">MULTIPLAYER</div>
</div>

<div id="multi-menu" class="screen" style="display:none;">
    <h2 id="peer-id-display">Connecting to Peer Network...</h2>
    <div class="btn" onclick="startHost()">HOST GAME</div>
    <input type="text" id="join-id" placeholder="Enter Friend's ID" style="padding:10px; margin:10px;">
    <div class="btn" onclick="startJoin()">JOIN GAME</div>
    <div class="btn" onclick="show('title-screen')">BACK</div>
</div>

<div id="map-select" class="screen" style="display:none;">
    <h2>SELECT ARENA</h2>
    <div class="btn" onclick="setMap('https://wallpaperaccess.com/full/51441.jpg')">VOID</div>
    <div class="btn" onclick="setMap('https://wallpaperaccess.com/full/1165415.jpg')">LAVA</div>
</div>

<div id="char-select" class="screen" style="display:none;">
    <div class="grid">
        <div class="card" id="Pikachu" onclick="pick('Pikachu')">PIKACHU</div>
        <div class="card" id="Lucario" onclick="pick('Lucario')">LUCARIO</div>
        <div class="card" id="Zygarde" onclick="pick('Zygarde')">ZYGARDE</div>
    </div>
    <div class="btn" onclick="readyUp()">READY</div>
</div>

<div id="game-ui">
    <p id="p1-p" class="pct-text">0%</p>
    <p id="p2-p" class="pct-text">0%</p>
</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1000; canvas.height = 500;
    
    let p1, p2, active = false, myChar = "Pikachu", mode = "npc", conn, peer;
    let projectiles = [];
    const stage = { x: 200, y: 380, w: 600, h: 40 };

    // --- NETWORK LOGIC ---
    peer = new Peer();
    peer.on('open', id => document.getElementById('peer-id-display').innerText = "YOUR ID: " + id);
    
    function startHost() {
        peer.on('connection', c => {
            conn = c;
            setupConn();
            show('map-select');
        });
    }

    function startJoin() {
        const id = document.getElementById('join-id').value;
        conn = peer.connect(id);
        setupConn();
    }

    function setupConn() {
        mode = "multi";
        conn.on('data', data => {
            if(data.type === 'start') {
                canvas.style.backgroundImage = `url('${data.map}')`;
                beginGame(data.c2, data.c1); 
            }
            if(data.type === 'update' && p2) {
                p2.x = data.x; p2.y = data.y; p2.pct = data.pct; p2.dir = data.dir;
            }
            if(data.type === 'atk') projectiles.push(new Projectile(p2.x+50, p2.y+50, p2.dir, p2));
        });
    }

    // --- GAME LOGIC ---
    function show(id) { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'flex'; }
    function setMode(m) { mode = m; show('map-select'); }
    function setMap(url) { mapUrl = url; show('char-select'); }
    function pick(n) { myChar = n; document.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); document.getElementById(n).classList.add('selected'); }
    
    function readyUp() {
        if(mode === "multi") {
            conn.send({type: 'start', map: mapUrl, c1: myChar, c2: myChar});
        }
        beginGame(myChar, "Zygarde");
    }

    function beginGame(c1, c2) {
        show('none'); canvas.style.display = "block"; document.getElementById('game-ui').style.display = "flex";
        p1 = new Fighter(300, c1, true);
        p2 = new Fighter(650, c2, false);
        active = true; loop();
    }

    class Projectile {
        constructor(x, y, dir, owner) { this.x = x; this.y = y; this.vx = dir * 15; this.owner = owner; this.life = 60; }
        draw() { ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(this.x, this.y, 10, 0, Math.PI*2); ctx.fill(); }
    }

    class Fighter {
        constructor(x, n, isP) {
            this.x = x; this.y = 100; this.w = 90; this.h = 90; this.vx = 0; this.vy = 0; this.pct = 0;
            this.isP = isP; this.dir = isP ? 1 : -1; this.jumps = 0;
            this.img = new Image();
            const ids = {Pikachu:25, Lucario:448, Zygarde:718};
            this.img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/${ids[n]||25}.gif`;
        }
        update() {
            this.vy += 0.7; this.x += this.vx; this.y += this.vy; this.vx *= 0.9;
            if (this.y + this.h > stage.y && this.y < stage.y + stage.h && this.x + this.w > stage.x && this.x < stage.x + stage.w && this.vy > 0) {
                this.y = stage.y - this.h; this.vy = 0; this.jumps = 0;
            }
            if (this.y > 600 || this.x < -100) { this.x = 500; this.y = 50; this.pct = 0; }
            document.getElementById(this.isP ? 'p1-p' : 'p2-p').innerText = Math.floor(this.pct) + "%";
        }
        draw() { ctx.drawImage(this.img, this.x, this.y, this.w, this.h); }
    }

    const keys = {};
    window.onkeydown = e => {
        keys[e.key] = true;
        if(e.key === "ArrowUp" && p1.jumps < 2) { p1.vy = -14; p1.jumps++; }
        if(e.key === " ") { 
            projectiles.push(new Projectile(p1.x+40, p1.y+40, p1.dir, p1)); 
            if(conn) conn.send({type:'atk'});
        }
    };
    window.onkeyup = e => keys[e.key] = false;

    function loop() {
        if(!active) return;
        ctx.clearRect(0,0,1000,500);
        ctx.fillStyle = "rgba(0,255,204,0.2)"; ctx.fillRect(stage.x, stage.y, stage.w, stage.h);
        
        if(keys.ArrowLeft) { p1.vx = -6; p1.dir = -1; }
        if(keys.ArrowRight) { p1.vx = 6; p1.dir = 1; }

        if(conn) conn.send({type:'update', x:p1.x, y:p1.y, pct:p1.pct, dir:p1.dir});

        projectiles.forEach((proj, i) => {
            proj.x += proj.vx; proj.draw();
            let t = proj.owner === p1 ? p2 : p1;
            if(proj.x > t.x && proj.x < t.x + 90 && proj.y > t.y && proj.y < t.y + 90) {
                t.pct += 5; t.vx = proj.vx * (t.pct/20); projectiles.splice(i,1);
            }
        });

        p1.update(); if(mode === "npc") p2.update();
        p1.draw(); p2.draw();
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
