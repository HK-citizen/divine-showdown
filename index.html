<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Divine Showdown: Ultimate Omega</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #title-screen { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://wallpaperaccess.com/full/51441.jpg'); background-size: cover; z-index: 200; }
        .omega-text { font-size: 70px; margin: 0; background: linear-gradient(to right, #ff0055, #00ffcc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .btn { font-size: 18px; padding: 12px 35px; cursor: pointer; margin: 8px; background: rgba(0,0,0,0.9); border: 2px solid #00ffcc; color: #00ffcc; z-index: 500; position: relative; transition: 0.1s; }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; }
        #game-ui { display: none; width: 1000px; justify-content: space-between; padding: 10px; z-index: 50; position: absolute; top: 0; }
        .pct-text { font-size: 50px; font-style: italic; margin: 0; color: #ff0055; text-shadow: 3px 3px #000; }
        canvas { border: 4px solid #00ffcc; background-color: #111; background-size: cover; display: none; box-shadow: 0 0 50px rgba(0,255,204,0.3); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px; }
        .card { padding: 15px; border: 2px solid #444; cursor: pointer; background: #111; transition: 0.2s; }
        .card.selected { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; transform: scale(1.1); }
        #victory-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; background: rgba(0,0,0,0.95); padding: 50px; border: 5px solid #00ffcc; text-align: center; }
    </style>
</head>
<body>

<div id="title-screen" class="screen">
    <h1 class="omega-text">OMEGA</h1>
    <div class="btn" onclick="show('map-select')">SOLO ASCENSION</div>
    <div class="btn" onclick="show('code-screen')">ENTER CODE</div>
</div>

<div id="code-screen" class="screen" style="display:none; z-index:250;">
    <h2>SECRET DATA INPUT</h2>
    <input type="text" id="code-in" style="background:#000; color:gold; border:2px solid gold; padding:10px; text-align:center; font-size:20px;">
    <div class="btn" onclick="checkCode()">ACTIVATE</div>
    <div class="btn" onclick="show('title-screen')">BACK</div>
</div>

<div id="map-select" class="screen" style="display:none; z-index:210;">
    <h2>SELECT ARENA</h2>
    <div class="btn" onclick="setMap('https://wallpaperaccess.com/full/51441.jpg')">VOID ARENA</div>
    <div class="btn" onclick="setMap('https://wallpaperaccess.com/full/1165415.jpg')">LAVA CHAMBER</div>
    <div class="btn" onclick="setMap('https://wallpaperaccess.com/full/156340.jpg')">SKY PALACE</div>
</div>

<div id="char-select" class="screen" style="display:none; z-index:220;">
    <div class="grid">
        <div class="card" id="Pikachu" onclick="pick('Pikachu')">PIKACHU</div>
        <div class="card" id="Lucario" onclick="pick('Lucario')">LUCARIO</div>
        <div class="card" id="Greninja" onclick="pick('Greninja')">GRENINJA</div>
        <div class="card" id="Necrozma" onclick="pick('Necrozma')">NECROZMA</div>
        <div class="card" id="Zygarde" onclick="pick('Zygarde')">ZYGARDE</div>
        <div class="card" id="Broguin" style="display:none; color:gold;" onclick="pick('Broguin')">BROGUIN 🐧</div>
    </div>
    <div class="btn" onclick="startGame()">START BATTLE</div>
</div>

<div id="victory-screen">
    <h1 id="win-txt" style="font-size: 60px; color: #00ffcc;">VICTORY</h1>
    <div class="btn" onclick="location.reload()">REMATCH</div>
</div>

<div id="game-ui">
    <p id="p1-p" class="pct-text">0%</p>
    <div id="stocks" style="color:#00ffcc; font-size:20px;">● ● ●</div>
    <p id="p2-p" class="pct-text">0%</p>
</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1000; canvas.height = 500;
    
    let p1, p2, active = false, myChar = "Pikachu", mapUrl = "", shake = 0, projectiles = [];
    const stage = { x: 200, y: 380, w: 600, h: 40 };

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        if(id !== 'none') document.getElementById(id).style.display = 'flex';
    }

    function checkCode() {
        if(document.getElementById('code-in').value.toUpperCase() === "BROGIUN") {
            document.getElementById('Broguin').style.display = "block";
            alert("🐧 BROGUIN AWAKENED");
        }
    }

    function setMap(url) { mapUrl = url; show('char-select'); }
    function pick(n) { 
        myChar = n; 
        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
        document.getElementById(n).classList.add('selected');
    }

    function startGame() {
        show('none');
        canvas.style.display = "block";
        document.getElementById('game-ui').style.display = "flex";
        canvas.style.backgroundImage = `url('${mapUrl}')`;
        p1 = new Fighter(300, myChar, true);
        p2 = new Fighter(650, "Necrozma", false);
        active = true;
        loop();
    }

    class Projectile {
        constructor(x, y, dir, owner) {
            this.x = x; this.y = y; this.vx = dir * 15; this.owner = owner; this.life = 60;
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.fillStyle = this.owner.isPlayer ? "#00ffff" : "#ff0055";
            ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath(); ctx.arc(this.x, this.y, 12, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
    }

    class Fighter {
        constructor(x, n, isPlayer) {
            this.x = x; this.y = 100; this.w = 100; this.h = 100;
            this.vx = 0; this.vy = 0; this.pct = 0; this.stocks = 3;
            this.isPlayer = isPlayer; this.dir = isPlayer ? 1 : -1;
            this.jumps = 0; this.m1Anim = 0;
            this.img = new Image();
            const ids = {Pikachu:25, Lucario:448, Greninja:658, Zygarde:718, Necrozma:800, Broguin:393};
            this.img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/${ids[n]||25}.gif`;
        }
        update() {
            this.vy += 0.7; this.x += this.vx; this.y += this.vy; this.vx *= 0.93;
            if (this.y + this.h > stage.y && this.y < stage.y + stage.h && this.x + this.w > stage.x && this.x < stage.x + stage.w && this.vy > 0) {
                this.y = stage.y - this.h; this.vy = 0; this.jumps = 0;
            }
            if (this.y > 600 || this.x < -200 || this.x > 1200) { 
                this.stocks--; this.x = 500; this.y = 50; this.pct = 0; this.vx = 0;
                if(this.stocks <= 0) { active = false; document.getElementById('victory-screen').style.display = 'block'; }
            }
            if(this.m1Anim > 0) this.m1Anim--;
            document.getElementById(this.isPlayer ? 'p1-p' : 'p2-p').innerText = Math.floor(this.pct) + "%";
        }
        draw() {
            ctx.save();
            if(this.m1Anim > 0) {
                ctx.fillStyle = "rgba(255,255,255,0.5)";
                ctx.beginPath(); ctx.arc(this.x + (this.dir===1?this.w:0), this.y+50, 50, 0, Math.PI*2); ctx.fill();
            }
            if(this.dir === -1) { ctx.translate(this.x+this.w, this.y); ctx.scale(-1, 1); ctx.drawImage(this.img, 0, 0, this.w, this.h); }
            else { ctx.drawImage(this.img, this.x, this.y, this.w, this.h); }
            ctx.restore();
        }
    }

    const keys = {};
    window.onkeydown = e => {
        keys[e.key] = true;
        if (e.key === "ArrowUp" && p1.jumps < 2) { p1.vy = -14; p1.jumps++; }
        if (e.key === " ") projectiles.push(new Projectile(p1.x+50, p1.y+50, p1.dir, p1));
    };
    window.onkeyup = e => keys[e.key] = false;
    window.onmousedown = () => {
        p1.m1Anim = 10;
        if (Math.abs(p1.x - p2.x) < 120) { p2.pct += 4; p2.vx = p1.dir * 8; shake = 5; }
    };

    function loop() {
        if (!active) return;
        ctx.save();
        if(shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.9; }
        ctx.clearRect(0,0,1000,500);
        ctx.fillStyle = "rgba(0,255,204,0.2)"; ctx.fillRect(stage.x, stage.y, stage.w, stage.h);
        
        if (keys.ArrowLeft) { p1.vx = -6; p1.dir = -1; }
        if (keys.ArrowRight) { p1.vx = 6; p1.dir = 1; }

        projectiles.forEach((proj, i) => {
            proj.x += proj.vx; proj.draw();
            let t = proj.owner === p1 ? p2 : p1;
            if (proj.x > t.x && proj.x < t.x + t.w && proj.y > t.y && proj.y < t.y + t.h) {
                t.pct += 8; t.vx = proj.vx * (t.pct/20); t.vy = -t.pct/15; shake = 10; projectiles.splice(i, 1);
            }
            if (proj.x < -100 || proj.x > 1100) projectiles.splice(i, 1);
        });

        if (Math.random() < 0.01) projectiles.push(new Projectile(p2.x+50, p2.y+50, p2.dir, p2));
        if (p2.x < p1.x - 150) p2.vx = 4; else if (p2.x > p1.x + 150) p2.vx = -4;

        p1.update(); p2.update(); p1.draw(); p2.draw();
        ctx.restore();
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
