<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Omega: Divine Showdown</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #title-screen { background: radial-gradient(circle, #222, #000); z-index: 200; }
        .btn { font-size: 18px; padding: 12px 30px; cursor: pointer; margin: 8px; background: #111; border: 2px solid #00ffcc; color: #00ffcc; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 20px #00ffcc; }
        #game-ui { display: none; width: 900px; justify-content: space-between; padding: 10px; position: absolute; top: 0; z-index: 50; pointer-events: none; }
        .pct { font-size: 45px; color: #ff0055; font-style: italic; text-shadow: 2px 2px #000; }
        canvas { border: 4px solid #00ffcc; background: #111; display: none; background-size: cover; background-position: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { padding: 15px; border: 2px solid #444; background: #111; cursor: pointer; }
        .card.selected { border-color: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>

<div id="title-screen" class="screen">
    <h1 style="font-size:70px; color:#00ffcc; margin:0; text-shadow: 0 0 20px #00ffcc;">OMEGA</h1>
    <div class="btn" onclick="show('map-select')">SOLO ASCENSION</div>
    <div class="btn" onclick="show('multi-menu')">MULTIPLAYER</div>
    <div class="btn" onclick="show('code-screen')">ENTER CODE</div>
</div>

<div id="multi-menu" class="screen" style="display:none;">
    <h3 id="my-id">Connecting...</h3>
    <input type="text" id="join-id" placeholder="Friend's ID" style="padding:10px; width:200px;">
    <div class="btn" onclick="startHost()">HOST</div>
    <div class="btn" onclick="startJoin()">JOIN</div>
    <div class="btn" onclick="show('title-screen')">BACK</div>
</div>
