<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1000; canvas.height = 500;
    
    let p1, p2, active = false, myChar = "Pikachu", gameMode = "npc", shake = 0, gameOver = false, selectedMap = "";
    let projectiles = [];
    const stage = { x: 200, y: 380, w: 600, h: 40 };

    function swap(id) { document.querySelectorAll('.full-screen').forEach(s => s.style.display = 'none'); if(id !== 'none') document.getElementById(id).style.display = 'flex'; }
    function setMode(m) { gameMode = m; swap('map-select'); }
    function pickMap(url) { selectedMap = url; swap('char-select'); }
    function checkCode() { if(document.getElementById('code-in').value.toUpperCase()==="BROGIUN") { document.getElementById('Broguin').style.display="block"; alert("🐧 BROGUIN UNLOCKED"); } }
    function pick(n) { myChar=n; document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected')); document.getElementById(n).classList.add('selected'); }
    function readyUp() { begin(); }

    function begin() {
        swap('none'); document.getElementById('hud').style.display='flex'; document.getElementById('game-container').style.display='flex';
        canvas.style.backgroundImage=`url('${selectedMap}')`;
        p1=new Fighter(300,myChar,true); p2=new Fighter(650,"Necrozma",false);
        active=true; loop();
    }

    class Projectile {
        constructor(x, y, dir, owner) {
            this.x = x; this.y = y; this.vx = dir * 15; this.owner = owner; this.life = 70;
        }
        draw() {
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.fillStyle = this.owner === "Lucario" ? "#00ffff" : "#ff0055";
            ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath(); ctx.arc(this.x, this.y, 12, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
    }

    class Fighter {
        constructor(x,n,m) { 
            this.x=x;this.y=100;this.name=n;this.isMine=m;this.vx=0;this.vy=0;this.pct=0;this.stocks=3;
            this.w=n==="Necrozma"?130:100;this.h=this.w;this.img=new Image();this.img.src=this.getImg(n);
            this.beam=0; this.dir=m?1:-1; this.jumps=0; this.m1Anim = 0;
        }
        getImg(n) { const d={Pikachu:25,Lucario:448,Greninja:658,Broguin:393,Necrozma:800,Zygarde:718}; return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/showdown/${d[n]||25}.gif`; }
        
        // M1 Attack Logic
        m1Attack() {
            this.m1Anim = 10;
            let hitRange = 100;
            let target = this.isMine ? p2 : p1;
            let dist = Math.abs((this.x + this.w/2) - (target.x + target.w/2));
            if(dist < hitRange && Math.abs(this.y - target.y) < 50) {
                target.pct += 4;
                target.vx = this.dir * 5; // Light knockback for combos
                shake = 5;
            }
        }

        update() {
            if(gameOver) return;
            this.vy+=0.75; this.y+=this.vy; this.x+=this.vx; this.vx*=0.94;
            if(this.vx > 0.5) this.dir = 1; if(this.vx < -0.5) this.dir = -1;
            if(this.y+this.h>stage.y && this.y<stage.y+stage.h && this.x+this.w>stage.x && this.x<stage.x+stage.w && this.vy>0) { this.y=stage.y-this.h; this.vy=0; this.jumps = 0; }
            if(this.x<-200||this.x>1200||this.y>600) { 
                this.stocks--; this.beam=30; this.dX=this.x; this.x=500; this.y=50; this.pct=0; this.vx=0;
                if(this.stocks<=0) { gameOver=true; document.getElementById('victory-screen').style.display='block'; }
            }
            if(this.m1Anim > 0) this.m1Anim--;
            document.getElementById(this.isMine?'p1-p':'p2-p').innerText=Math.floor(this.pct)+"%"; 
            document.getElementById(this.isMine?'p1-s':'p2-s').innerText="● ".repeat(Math.max(0,this.stocks));
        }
        draw() {
            ctx.save();
            if(this.beam>0) { ctx.fillStyle=this.isMine?"#00ffcc":"#ff0055"; ctx.fillRect(this.dX<0?0:960,0,40,500); this.beam--; }
            if(this.m1Anim > 0) { // Visual for M1 Attack
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(this.x + (this.dir === 1 ? this.w : 0), this.y + this.h/2, 40, 0, Math.PI*2);
                ctx.fill();
            }
            if(this.dir === -1) { ctx.translate(this.x+this.w, this.y); ctx.scale(-1,1); ctx.drawImage(this.img,0,0,this.w,this.h); }
            else { ctx.drawImage(this.img,this.x,this.y,this.w,this.h); }
            ctx.restore();
        }
    }

    const keys = {}; 
    window.onmousedown = (e) => { if(active && !gameOver) p1.m1Attack(); }; // M1 ATTACK
    window.onkeydown=e=>{ 
        if(e.key===' ' && !keys[' ']) projectiles.push(new Projectile(p1.x+p1.w/2, p1.y+p1.h/2, p1.dir, p1.name));
        if(e.key==='ArrowUp' && p1.jumps < 2) { p1.vy = -14; p1.jumps++; }
        keys[e.key]=true; 
    };
    window.onkeyup=e=>keys[e.key]=false;

    function loop() {
        if(!active||gameOver) return;
        ctx.save(); if(shake>0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake*=0.9; }
        ctx.clearRect(-100,-100,1200,700); ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(stage.x,stage.y,stage.w,stage.h);
        if(keys['ArrowLeft']) p1.vx=-6.5; if(keys['ArrowRight']) p1.vx=6.5;
        projectiles.forEach((proj, i) => {
            proj.x += proj.vx; proj.life--; proj.draw();
            let targets = [p1, p2];
            targets.forEach(t => {
                if(proj.owner !== t.name && proj.x > t.x && proj.x < t.x+t.w && proj.y > t.y && proj.y < t.y+t.h) {
                    t.pct += 8; t.vx = proj.vx * (t.pct/22); t.vy = -t.pct/12; shake = 15; projectiles.splice(i,1);
                }
            });
            if(proj.life<=0) projectiles.splice(i,1);
        });
        if(gameMode==="npc") {
            if(p2.x<p1.x-150) p2.vx=4.5; else if(p2.x>p1.x+150) p2.vx=-4.5;
            if(Math.random()<0.01) projectiles.push(new Projectile(p2.x+p2.w/2, p2.y+p2.h/2, p2.dir, p2.name));
            if(Math.abs(p2.x - p1.x) < 80) p2.m1Attack();
        }
        p1.update(); p2.update(); p1.draw(); p2.draw(); ctx.restore(); requestAnimationFrame(loop);
    }
</script>
